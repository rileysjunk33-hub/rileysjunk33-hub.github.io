<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reston Eco-Delivery | Secure Board</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌿</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-light: #f3f4f6;
            --card-white: #ffffff;
            --primary: #10b981;
            --accent: #3b82f6;
            --text-dark: #1f2937;
            --text-muted: #6b7280;
            --danger: #ef4444;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-light); 
            margin: 0; padding: 20px; 
            color: var(--text-dark);
            display: flex; justify-content: center; min-height: 100vh;
        }

        .container { width: 100%; max-width: 500px; }

        .header-box {
            background: var(--primary); color: white; padding: 20px;
            border-radius: 16px; text-align: center; margin-bottom: 25px;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); position: relative;
        }

        .header-box h1 { margin: 0; font-size: 1.5em; font-weight: 800; }

        .panel { 
            background: var(--card-white); padding: 30px; border-radius: 20px; 
            margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.03);
        }

        .user-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: #fff; padding: 10px 20px; border-radius: 12px;
            margin-bottom: 20px; font-size: 0.8em; font-weight: 700;
        }

        input { 
            width: 100%; padding: 14px; margin: 8px 0; 
            background: #f9fafb; border: 1px solid #e5e7eb; 
            border-radius: 12px; font-family: inherit; box-sizing: border-box;
        }

        .btn { 
            padding: 16px; border: none; border-radius: 14px; 
            cursor: pointer; font-weight: 800; width: 100%; 
            font-size: 14px; text-transform: uppercase; transition: 0.2s;
        }
        
        .btn-post { background: var(--primary); color: white; margin-top: 10px; }
        .btn-staff { background: #6366f1; color: white; margin-top: 10px; }
        .btn-report { background: #1f2937; color: white; margin-bottom: 20px; }
        .btn-accept { background: var(--accent); color: white; }
        .btn-complete { background: #fbbf24; color: #000; }
        .btn-remove { background: none; border: 1px solid var(--danger); color: var(--danger); font-size: 10px; margin-top: 15px; }

        .status {
            position: absolute; top: 25px; right: 25px;
            font-size: 0.65em; font-weight: 800; padding: 4px 10px; border-radius: 6px;
        }
        .status-open { background: #d1fae5; color: #065f46; }
        .status-busy { background: #dbeafe; color: #1e40af; }

        .biker-tag { font-size: 11px; color: var(--accent); font-weight: 800; margin-top: 5px; display: block; }
        .chip { background: #f9fafb; padding: 12px; border-radius: 12px; margin: 10px 0; border: 1px solid #f3f4f6; }
        .chip-label { font-size: 9px; color: var(--text-muted); font-weight: 800; text-transform: uppercase; }
        .chip-val { font-size: 13px; font-weight: 600; }

        .price-grid { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .earnings { font-size: 1.4em; font-weight: 800; color: var(--primary); }

        #admin-panel { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <button onclick="checkAdmin()" id="lock" style="position:absolute; right:15px; top:20px; background:none; border:none; color:rgba(255,255,255,0.6); cursor:pointer;">⚙️</button>
        <h1>Reston Biker Board</h1>
    </div>

    <div id="login-overlay" class="panel">
        <h2 style="text-align:center">Biker Login</h2>
        <p style="text-align:center; font-size: 0.8em; color: var(--text-muted);">Enter your 4-digit staff code.</p>
        <input type="password" id="biker-code-input" maxlength="4" placeholder="••••" style="text-align:center; font-size: 2em; letter-spacing: 10px;">
        <button onclick="verifyBiker()" class="btn btn-post">Sign In</button>
    </div>

    <div id="main-board" style="display:none;">
        <div class="user-bar">
            <span>Biker: <span id="display-name" style="color:var(--accent);">--</span></span>
            <button onclick="location.reload()" style="background:none; border:none; color:var(--danger); font-weight:800; cursor:pointer;">LOGOUT</button>
        </div>

        <div style="display:flex; gap:10px;">
            <button id="report-btn" onclick="genReport()" class="btn btn-report" style="display:none;">Weekly Report</button>
        </div>

        <div id="admin-panel" class="panel">
            <h2>Admin Controls</h2>
            <button onclick="createEmployee()" class="btn btn-staff">Create Employee Code</button>
            <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
            <input type="text" id="r-name" placeholder="Restaurant">
            <input type="text" id="items" placeholder="Items">
            <input type="text" id="r-addr" placeholder="Pickup Address">
            <input type="text" id="d-addr" placeholder="Delivery Address">
            <div style="display:flex; gap:10px;">
                <input type="number" id="cust-total" placeholder="Customer Total $">
                <input type="number" id="biker-pay" placeholder="Biker Earnings $">
            </div>
            <button onclick="postOrder()" class="btn btn-post">Post New Order</button>
        </div>

        <div id="order-list"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, update, remove, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAPdW-0WhvsGk4Lbgjrp08QBnR0QBOJ44k",
        authDomain: "reston-delivery.firebaseapp.com",
        databaseURL: "https://reston-delivery-default-rtdb.firebaseio.com", 
        projectId: "reston-delivery",
        storageBucket: "reston-delivery.firebasestorage.app",
        messagingSenderId: "274165504629",
        appId: "1:274165504629:web:c46fec849aade16874f63c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const ordersRef = ref(db, 'orders');
    const staffRef = ref(db, 'employees');

    let isAdmin = false;
    let bikerName = "";

    window.verifyBiker = async () => {
        const inputCode = document.getElementById('biker-code-input').value;
        const snapshot = await get(staffRef);
        const staffData = snapshot.val();
        
        let found = false;
        if(staffData) {
            Object.values(staffData).forEach(staff => {
                if(staff.code === inputCode) {
                    bikerName = staff.name;
                    found = true;
                }
            });
        }

        if(found) {
            document.getElementById('display-name').innerText = bikerName;
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-board').style.display = 'block';
            renderOrders();
        } else {
            alert("Invalid Code");
        }
    };

    window.checkAdmin = () => {
        if (prompt("Admin Pass:") === "reston_go") {
            isAdmin = true;
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('report-btn').style.display = 'block';
            document.getElementById('lock').style.display = 'none';
            renderOrders();
        }
    };

    window.createEmployee = () => {
        const name = prompt("Enter Employee Name:");
        if(!name) return;
        const code = Math.floor(1000 + Math.random() * 9000).toString();
        push(staffRef, { name: name, code: code });
        alert(`EMPLOYEE CREATED\nName: ${name}\nAccess Code: ${code}\n\nGive this code to them for login.`);
    };

    window.postOrder = () => {
        push(ordersRef, {
            res: document.getElementById('r-name').value,
            items: document.getElementById('items').value,
            p_addr: document.getElementById('r-addr').value,
            d_addr: document.getElementById('d-addr').value,
            total: document.getElementById('cust-total').value,
            pay: document.getElementById('biker-pay').value,
            status: "open",
            biker: ""
        });
        document.querySelectorAll('input').forEach(i => i.value = '');
    };

    window.genReport = () => {
        onValue(ordersRef, (snap) => {
            const data = snap.val();
            if(!data) return;
            let report = "WEEKLY PAYOUT REPORT\n------------------\n";
            let grandTotal = 0;
            Object.values(data).forEach(o => {
                if(o.status === 'done') {
                    report += `${o.biker}: $${o.pay} (${o.res})\n`;
                    grandTotal += Number(o.pay);
                }
            });
            report += `------------------\nTOTAL: $${grandTotal}`;
            alert(report);
        }, { onlyOnce: true });
    };

    function renderOrders() {
        onValue(ordersRef, (snap) => {
            const container = document.getElementById('order-list');
            container.innerHTML = '';
            const data = snap.val();
            if(!data) return;

            Object.entries(data).reverse().forEach(([id, o]) => {
                const card = document.createElement('div');
                card.className = "panel order-card";
                
                let btnHtml = `<button onclick="acceptJob('${id}')" class="btn btn-accept">Accept Order</button>`;
                let statusHtml = `<span class="status status-open">Available</span>`;
                let bikerTag = "";

                if(o.status === 'busy') {
                    statusHtml = `<span class="status status-busy">On The Way</span>`;
                    bikerTag = `<span class="biker-tag">TAKEN BY ${o.biker}</span>`;
                    btnHtml = (o.biker === bikerName) ? 
                        `<button onclick="updateStatus('${id}', 'done')" class="btn btn-complete">Mark Delivered</button>` : 
                        `<button class="btn" style="background:#e5e7eb; color:#9ca3af; cursor:default;">Unavailable</button>`;
                } else if (o.status === 'done') {
                    statusHtml = `<span class="status status-done">Delivered</span>`;
                    bikerTag = `<span class="biker-tag" style="color:var(--primary)">COMPLETED BY ${o.biker}</span>`;
                    btnHtml = `<p style="text-align:center; color:var(--primary); font-weight:800; font-size:0.8em;">SUCCESS</p>`;
                    card.style.opacity = "0.6";
                }

                card.innerHTML = `
                    ${statusHtml}
                    <h2 style="margin:0;">${o.res}</h2>
                    ${bikerTag}
                    <p style="color:var(--text-muted); font-size:0.9em; margin:10px 0;">${o.items}</p>
                    <div class="chip"><div class="chip-label">Pickup</div><div class="chip-val">📍 ${o.p_addr}</div></div>
                    <div class="chip"><div class="chip-label">Drop-off</div><div class="chip-val">🏠 ${o.d_addr}</div></div>
                    <div class="price-grid">
                        <div>
                            <div class="total-ref">Total: $${o.total}</div>
                            <div class="earnings">$${o.pay}</div>
                        </div>
                        <div style="width:160px;">${btnHtml}</div>
                    </div>
                    <button class="btn btn-remove" style="display:${isAdmin?'block':'none'}" onclick="del('${id}')">Remove Order</button>
                `;
                container.appendChild(card);
            });
        });
    }

    window.acceptJob = (id) => update(ref(db, `orders/${id}`), { status: 'busy', biker: bikerName });
    window.updateStatus = (id, s) => update(ref(db, `orders/${id}`), { status: s });
    window.del = (id) => { if(confirm("Remove?")) remove(ref(db, `orders/${id}`)); };
</script>
</body>
</html>
