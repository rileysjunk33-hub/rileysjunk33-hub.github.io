<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exchangeland | No KYC Crypto</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Orbitron:wght@500;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at top right, #1a1a2e, #0a0a0a);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Nav Bar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Hero Section */
        .hero {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, var(--neon-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: 1.2rem;
            color: #aaa;
            margin-bottom: 30px;
        }

        /* The Buy Card (Glassmorphism) */
        .exchange-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            padding: 12px;
            color: white;
            border-radius: 8px;
            margin-top: 5px;
            box-sizing: border-box;
        }

        .buy-btn {
            width: 100%;
            background: var(--neon-cyan);
            color: black;
            border: none;
            padding: 15px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .buy-btn:hover {
            box-shadow: 0 0 20px var(--neon-cyan);
            transform: translateY(-2px);
        }

        .no-kyc-badge {
            margin-top: 15px;
            display: inline-block;
            font-size: 0.8rem;
            color: #00ff88;
            border: 1px solid #00ff88;
            padding: 4px 10px;
            border-radius: 50px;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">ExchangeLand</div>
        <div>
            <span style="margin-right: 20px; cursor: pointer;">Markets</span>
            <button style="background: transparent; border: 1px solid white; color: white; padding: 8px 15px; border-radius: 5px; cursor: pointer;">Connect Wallet</button>
        </div>
    </nav>

    <div class="hero">
        <h1>Trade Beyond Limits</h1>
        <p class="tagline">The future of exchange. No KYC. No tracking. Just Crypto.</p>

        <div class="exchange-card">
            <div class="input-group">
                <label>You Send</label>
                <input type="text" placeholder="0.00 BTC">
            </div>
            <div class="input-group">
                <label>You Get</label>
                <input type="text" placeholder="0.00 ETH">
            </div>
            <button class="buy-btn">Swap Now</button>
            <div class="no-kyc-badge">● Anonymous Core Enabled</div>
        </div>
    </div>

</body>
</html>
